name: test

on: [push, workflow_dispatch]

env:
  DATA_W: 5

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install iverilog
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python packages
        shell: bash
        run: pip install -r test/requirements.txt

      - name: Run tests
        run: |
          cd test
          make clean
          COCOTB_RESULTS_FILE=results_rtl_w${DATA_W}.xml make DATA_W=${DATA_W}
          ! grep failure results_rtl_w${DATA_W}.xml

      - name: Test Summary
        uses: test-summary/action@v2.4
        with:
          paths: "test/results_rtl_w${{ env.DATA_W }}.xml"
        if: always()

      - name: upload waveform and test results
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-w${{ env.DATA_W }}
          path: |
            test/tb.fst
            test/results_rtl_w${{ env.DATA_W }}.xml
            test/output/*
