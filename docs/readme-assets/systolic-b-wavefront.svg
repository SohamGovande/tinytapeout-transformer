        font-weight: 700;
      }
      .subtitle {
        font-size: 18px;
        font-style: italic;
        fill: #655f72;
      }
      .label {
        font-size: 18px;
        font-weight: 700;
      }
      .body {
        font-size: 16px;
        fill: #655f72;
